<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <h3>v-show 디렉티브</h3>
      <div>
        예금액: <input type="text" v-model="amount1" />

        <!-- amount1 < 0 이면 display:none;을 제거하여 화면에 보이게함-->
        <img
          v-show="amount1 < 0"
          src="https://contactsvc.bmaster.kro.kr/img/error.png"
          title="마이너스는 허용하지 않습니다."
          style="width: 15px; height: 15px; vertical-align: middle"
        />
      </div>
      <hr />

      <h3>v-if 디렉티브</h3>
      <div>
        예금액: <input type="text" v-model.number="amount2" />

        <!-- amount2 < 0 이면 img 요소를 생성함 -->
        <img
          v-if="amount2 < 0"
          src="https://contactsvc.bmaster.kro.kr/img/error.png"
          title="마이너스는 허용하지 않습니다."
          style="width: 15px; height: 15px; vertical-align: middle"
        />
      </div>
    </div>

    <script src="http://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return { amount1: '', amount2: '' };
        },
      }).mount('#app');
    </script>
  </body>
</html>
