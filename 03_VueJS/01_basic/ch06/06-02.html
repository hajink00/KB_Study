<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <button
        :style="style1"
        @mouseenter="change(style1)"
        @mouseleave="resetStyle"
      >
        테스트
      </button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return { style1: { backgroundColor: 'aqua', color: 'black' } };
        },
        methods: {
          change(style1) {
            this.style1 = { backgroundColor: 'black', color: 'white' };
          },
          resetStyle() {
            // 원래 스타일로 복구
            this.style1 = { backgroundColor: 'aqua', color: 'black' };
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
